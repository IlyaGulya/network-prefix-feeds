name: Publish Prefix Feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish.yml"
      - "scripts/**"
      - "README.md"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build feeds
        run: python3 scripts/build_feeds.py

      - name: Ensure latest release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view latest >/dev/null 2>&1 || \
          gh release create latest --title "Latest prefix feeds" --notes "Automated feed release"

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload latest dist/* --clobber
